<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - SmartAmbulance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #0f1419;
            --secondary-dark: #1a2332;
            --accent-primary: #00d4ff;
            --accent-secondary: #0066cc;
            --text-primary: #e8eef7;
            --text-secondary: #a0a8b8;
            --border-color: #2a3a52;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark), var(--secondary-dark));
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            width: 100%;
            max-width: 450px;
            background: var(--secondary-dark);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: block;
        }
        
        .form-control {
            background: var(--primary-dark);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            background: var(--primary-dark);
            border-color: var(--accent-primary);
            color: var(--text-primary);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
            outline: none;
        }
        
        .btn-submit {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            color: var(--primary-dark);
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }
        
        .alert-box {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4444;
            color: #ff6b6b;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
        }
        
        .demo-box {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent-primary);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        .demo-box strong {
            color: var(--accent-primary);
        }
        
        .optional-badge {
            display: inline-block;
            background: rgba(0, 212, 255, 0.2);
            color: var(--accent-primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .back-link a:hover {
            color: #00a8cc;
        }

        @media (max-width: 576px) {
            .login-box {
                padding: 25px 20px;
            }
            
            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h1><i class="fas fa-user me-2"></i>User Login<span class="optional-badge">Optional</span></h1>
                <p>Access personalized features</p>
            </div>
            
            {% if error %}
            <div class="alert-box">
                <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
            </div>
            {% endif %}

            {% if success %}
            <div class="alert-box" style="background: rgba(0, 212, 255, 0.1); border-color: var(--accent-primary); color: var(--accent-primary);">
                <i class="fas fa-check-circle me-2"></i>{{ success }}
            </div>
            {% endif %}
            
            <form method="POST" action="/user-smart-login" id="smartAuthForm">
                <div class="form-group">
                    <label><i class="fas fa-id-card me-2"></i>National ID Card (CNIC)</label>
                    <input type="text" class="form-control" name="cnic" id="cnic" required placeholder="12345-1234567-1" maxlength="20">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user me-2"></i>Full Name</label>
                    <input type="text" class="form-control" name="full_name" id="full_name" required placeholder="e.g., Ahmed Hassan">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-phone me-2"></i>Phone Number</label>
                    <input type="text" class="form-control" name="phone" id="phone" required placeholder="03XXXXXXXXX">
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-sign-in-alt me-2"></i><span id="btnText">Access Account</span>
                </button>
            </form>
            
            <div class="back-link">
                <a href="/"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Smart Authentication Handler
        const form = document.getElementById('smartAuthForm');
        const cnicInput = document.getElementById('cnic');
        const fullNameInput = document.getElementById('full_name');
        const phoneInput = document.getElementById('phone');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');

        // CNIC Format Input Mask - Better Approach
        cnicInput.addEventListener('input', (e) => {
            // Get current cursor position
            const cursorPos = e.target.selectionStart;
            
            // Extract only digits from input
            let digitsOnly = e.target.value.replace(/\D/g, '');
            
            // Limit to exactly 13 digits
            digitsOnly = digitsOnly.slice(0, 13);
            
            // Format with dashes: XXXXX-XXXXXXX-X
            let formatted = '';
            for (let i = 0; i < digitsOnly.length; i++) {
                if (i === 5 || i === 12) {
                    formatted += '-';
                }
                formatted += digitsOnly[i];
            }
            
            // Set the formatted value
            e.target.value = formatted;
            
            // Restore or adjust cursor position
            let newCursorPos = cursorPos;
            if (cursorPos > 5 && digitsOnly.length > 5) newCursorPos++;  // After first dash
            if (cursorPos > 12 && digitsOnly.length > 12) newCursorPos++; // After second dash
            
            // Set cursor position
            setTimeout(() => {
                e.target.setSelectionRange(newCursorPos, newCursorPos);
            }, 0);
        });

        // Form Submission with Smart Auth
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const cnic = cnicInput.value.trim();
            const fullName = fullNameInput.value.trim();
            const phone = phoneInput.value.trim();

            // Validation
            if (!cnic || !fullName || !phone) {
                showError('Please fill in all fields');
                return;
            }

            // Check CNIC has exactly 13 digits (ignoring dashes)
            const cnicDigitsOnly = cnic.replace(/\D/g, '');
            if (cnicDigitsOnly.length !== 13) {
                showError('CNIC must contain exactly 13 digits');
                return;
            }

            if (fullName.length < 3) {
                showError('Full name must be at least 3 characters');
                return;
            }

            // Check phone format: exactly 11 digits and starts with 03
            if (phone.length !== 11) {
                showError('Phone number must be exactly 11 digits');
                return;
            }
            
            if (!phone.startsWith('03')) {
                showError('Phone number must start with 03');
                return;
            }
            
            if (!/^\d+$/.test(phone)) {
                showError('Phone number must contain only digits');
                return;
            }

            // Show loading state
            submitBtn.disabled = true;
            btnText.textContent = 'Processing...';

            try {
                const response = await fetch('/user-smart-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        cnic: cnic,
                        full_name: fullName,
                        phone: phone
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Store user session
                    sessionStorage.setItem('user_id', data.user_id);
                    sessionStorage.setItem('full_name', fullName);
                    sessionStorage.setItem('phone', phone);
                    sessionStorage.setItem('cnic', cnic);

                    // Show success message
                    btnText.textContent = 'Success! Redirecting...';
                    submitBtn.style.background = 'linear-gradient(135deg, #00cc66, #00aa44)';

                    // Redirect to home after 1 second
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showError(data.message || 'Authentication failed');
                    submitBtn.disabled = false;
                    btnText.textContent = 'Access Account';
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Connection error. Please try again.');
                submitBtn.disabled = false;
                btnText.textContent = 'Access Account';
            }
        });

        function showError(message) {
            // Remove existing alert if present
            const existingAlert = document.querySelector('.alert-box');
            if (existingAlert && existingAlert.classList.contains('error-alert')) {
                existingAlert.remove();
            }

            // Create new error alert
            const alertBox = document.createElement('div');
            alertBox.className = 'alert-box error-alert';
            alertBox.innerHTML = `<i class="fas fa-exclamation-circle me-2"></i>${message}`;
            
            const loginHeader = document.querySelector('.login-header');
            loginHeader.parentNode.insertBefore(alertBox, loginHeader.nextSibling);

            // Auto-remove after 5 seconds
            setTimeout(() => alertBox.remove(), 5000);
        }
    </script>
</body>
</html>
